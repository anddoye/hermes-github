name: Hermes GitHub CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      provider:
        description: 'Model provider'
        required: true
        type: choice
        options: [openai, anthropic, google, meta, mistral]
      model:
        description: 'Model name'
        required: true
        type: string
      prompt:
        description: 'User prompt'
        required: true
        type: string
      system_prompt:
        description: 'System prompt'
        required: false
        type: string
      max_tokens:
        description: 'Max tokens'
        required: false
        type: string
        default: '1024'
      temperature:
        description: 'Temperature'
        required: false
        type: string
        default: '0.7'
      top_p:
        description: 'Top P'
        required: false
        type: string
        default: '1.0'
      execution_id:
        description: 'Execution ID for tracking'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ─── Tests ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─── Build ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─── Docker Build ───────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hermes-github:latest .

      - name: Test Docker image
        run: |
          docker run --rm -d --name hermes-test -p 3000:3000 \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            hermes-github:latest
          sleep 5
          curl -f http://localhost:3000/health || (docker logs hermes-test && exit 1)
          docker stop hermes-test
